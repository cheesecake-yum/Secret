<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Khalil mp4</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            font-family: 'Helvetica', Arial, sans-serif;
            text-align: center;
        }
        .container {
            padding: 40px 20px;
            border: 4px solid #000;
            border-radius: 25px;
            background: #ffffff;
            max-width: 350px;
            width: 85%;
        }
        button {
            border: 3px solid #000;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin: 10px;
            display: inline-block; /* Ensures they stay side-by-side */
        }
        .btn-open { background-color: #ffffff; color: #000; } 
        .btn-yes { background-color: #ffeb3b; color: #000; } /* Yellow */
        .btn-no { background-color: #f48fb1; color: #fff; }  /* Pink */

        .emoji-header { font-size: 60px; display: block; margin-bottom: 10px; }
        .hidden { display: none; }
        #no-response { color: #f48fb1; font-size: 24px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="screen-entrance" class="container">
        <span class="emoji-header">🐰</span>
        <h1>for khalil mp4</h1>
        <button class="btn-open" onclick="goToQuestion()">Open Me</button>
    </div>

    <div id="screen-question" class="container hidden">
        <span class="emoji-header">🥳</span>
        <h1>Will you be my Valentine?</h1>
        <div id="button-area">
            <button class="btn-yes" onclick="showFinal()">Yes</button>
            <button class="btn-no" onclick="handleNo()">No</button>
        </div>
        <p id="no-response" class="hidden">HMP 😡</p>
    </div>

    <div id="screen-details" class="container hidden">
        <span class="emoji-header">🐰</span>
        <h1>Hehe! can't wait to see you! 🥰</h1>
        <p><strong>📅 When:</strong> Feb 14, 2026 @ 7PM</p>
        <p><strong>📍 Where:</strong> Shangri-La, Glorietta, or QC (?)</p>
    </div>

    <script>
        function goToQuestion() {
            document.getElementById('screen-entrance').classList.add('hidden');
            document.getElementById('screen-question').classList.remove('hidden');
        }

        function handleNo() {
            // Simply show the message without moving the button
            document.getElementById('no-response').classList.remove('hidden');
        }

        function showFinal() {
            document.getElementById('screen-question').classList.add('hidden');
            document.getElementById('screen-details').classList.remove('hidden');
        }
    </script>
</body>
</html>
